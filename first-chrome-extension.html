<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            padding: 10px;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        #input-el {
            width: 100%;
            padding: 10px;
            margin: 0%;
            box-sizing: border-box;
        }

        #input-el:hover {
            width: 99%;
            padding: 10px;
            margin: 0%;
            background-color: rgb(185, 226, 213);
            box-sizing: border-box;
        }

        button {
            background-color: #5f9341;
            color: white;
            padding: 10px 20px;
            margin-top: 5px;
            border: 1px solid #5f9341;
            font-weight: 700;
            cursor: pointer;
        }

        #delete-btn {
            background-color: white;
            color: #5f9341;
            padding: 10px 20px;
            margin-top: 5px;
            border: 1px solid #5f9341;
            font-weight: 700;
            cursor: pointer;
        }

        #unordered-list {
            list-style-type: none;
            padding-left: 0;
        }

        #unordered-list li {
            margin-top: 5px;
        }

        #unordered-list li a {
            color: #5f9341;
        }
    </style>
    <title>First Chrome Extension</title>
</head>

<body>
    <label for="text"></label>
    <input type="text" id="input-el" placeholder="Name">
    <button id="input-btn">SAVE INPUT</button>
    <button id="tab-btn">SAVE TAB</button>
    <button id="delete-btn">DELETE</button>
    <ul id="unordered-list"></ul>

    <script src="first-chrome-extension.js"></script>
</body>

</html>
