<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <style>
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .product-images {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        .product-images img {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: cover;
        }

        .add-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .add-btn:hover {
            background-color: #555;
        }

        .cart-summary {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            text-align: right;
        }

        .cart-summary h3 {
            margin: 0;
        }

        .total-price {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .cart-items {
            text-align: left;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .cart-items p {
            margin: 5px 0;
        }
    </style>
</head>

<body>
    <!--Name of Shop-->
    <div class="header">
        <h1>Welcome to Store X</h1>
        <p>We sell quality products for you</p>
    </div>

    <!--Products-->
    <div class="products">
        <div class="product-images">
            <img src="green-mat.jpg" alt="green mat">
            <h2>Green Mat</h2>
            <p>$50</p>
            <button class="add-btn" onclick="addToCart('Green Mat', 50)">Add to Cart</button>
        </div>

        <div class="product-images">
            <img src="blue-doormat.jpg" alt="blue mat">
            <h2>Blue Mat</h2>
            <p>$48</p>
            <button class="add-btn" onclick="addToCart('Blue Mat', 48)">Add to Cart</button>
        </div>

        <div class="product-images">
            <img src="cleansing-milk-and-oil.jpg" alt="Cleansing milk">
            <h2>Cleansing Milk and Oil</h2>
            <p>$64</p>
            <button class="add-btn" onclick="addToCart('Cleansing Milk and Oil', 64)">Add to Cart</button>
        </div>

        <div class="product-images">
            <img src="niacinamide.jpg" alt="niacinamide">
            <h2>Niacinamide</h2>
            <p>$35</p>
            <button class="add-btn" onclick="addToCart('Niacinamide', 35)">Add to Cart</button>
        </div>

        <div class="product-images">
            <img src="pink-mat.jpg" alt="pink mat">
            <h2>Pink Mat</h2>
            <p>$60</p>
            <button class="add-btn" onclick="addToCart('Pink Mat', 60)">Add to Cart</button>
        </div>
    </div>

    <div class="cart-summary">
        <h3>Your Cart</h3>
        <div class="cart-items" id="cartItems"></div>
        <p>Total: <span class="total-price" id="totalPrice">$0</span></p>
        <button onclick="clearCart()"
            style="background-color: #999; color: white; border: none; padding: 8px 15px; cursor: pointer;">Clear
            Cart</button>

        <script src="shopping-cart.js"></script>
</body>

</html>
