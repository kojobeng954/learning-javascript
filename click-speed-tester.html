<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Speed Tester</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin: 0 0 30px 0;
            font-size: 14px;
        }

        .display-section {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .stat {
            margin: 20px 0;
        }

        .stat-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #667eea;
            font-size: 48px;
            font-weight: bold;
        }

        .timer {
            color: #764ba2;
            font-size: 36px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #startBtn {
            background: #667eea;
            color: white;
            min-width: 150px;
        }

        #startBtn:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        #startBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #resetBtn {
            background: #e0e0e0;
            color: #333;
            min-width: 150px;
        }

        #resetBtn:hover {
            background: #d0d0d0;
            transform: translateY(-2px);
        }

        .click-zone {
            background: #f9f9f9;
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.1s ease;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
        }

        .click-zone.active {
            background: #e8eaf6;
            border-color: #764ba2;
            font-weight: 600;
            color: #764ba2;
        }

        .click-zone.active:active {
            background: #d1d5f0;
            transform: scale(0.98);
        }

        .result-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .result-message.show {
            display: block;
            background: #e3f2fd;
            color: #1976d2;
            border-left: 0px solid #1976d2;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Click Speed Tester</h1>
        <p class="subtitle">How fast can you click?</p>

        <div class="display-section">
            <div class="stat">
                <div class="stat-label">Clicks</div>
                <div class="stat-value" id="clickCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Time Remaining</div>
                <div class="timer" id="timer">5</div>
            </div>
        </div>

        <div class="click-zone" id="clickZone">Click here when timer starts</div>

        <div class="result-message" id="resultMessage"></div>

        <div class="button-group">
            <button id="startBtn" onclick="startTest()">Start Test</button>
            <button id="resetBtn" onclick="resetTest()">Reset</button>
        </div>
    </div>

    <script src="click-speed-tester.js"></script>
</body>

</html>
