<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        * {
            background-color: rgb(69, 66, 66);
            font-family: Arial, Helvetica, sans-serif;
        }

        .header {
            text-align: center;
            color: white;
        }

        .area {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #text-area {
            padding: 15px;
            background-color: white;
            color: black;
            border: none;
            border-radius: 50px;
            margin-bottom: 10px;
        }

        button {
            border: none;
            padding: 10px;
            border-radius: 10px;
            background-color: white;
            margin-top: 10px;
        }

        button:hover {
            background-color: grey;
            font-weight: 700;
            border-radius: 50px;
        }
    </style>
</head>

<body>
    <input type="text" id="text-area" placeholder="Add a task">
    <button id="btn">Add</button>
    <ul id="unordered-list"></ul>


    <script src="to-do-list.js"></script>
</body>

</html>
