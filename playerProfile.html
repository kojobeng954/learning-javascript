<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile</title>
    <style>
        * {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            text-align: center;
        }

        .playerUsername {
            border: 1px solid #232323;
        }

        .players {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        button {
            border: none;
            border-radius: 15px;
            background-color: #232323;
            color: white;
            margin-bottom: 15px;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Player profiles</h1>
        <p>Players with their stats</p>
    </div>

    <div class="players">
        <div class="playerUsername">
            <h2>Ernest</h2>
            <h3 id="scores">Score:</h3>
            <h4 id="levels">Level:</h4>
            <button class="btn">Increase Score</button>
        </div>

        <div class="playerUsername">
            <h2>Kojo</h2>
            <h3 id="scores">Score:</h3>
            <h4 id="levels">Level:</h4>
            <button class="btn">Increase Score</button>
        </div>

        <div class="playerUsername">
            <h2>Ntow</h2>
            <h3 id="scores">Score:</h3>
            <h4 id="levels">Level:</h4>
            <button class="btn">Increase Score</button>
        </div>
    </div>

    <script src="playerProfile.js"></script>
</body>

</html>
